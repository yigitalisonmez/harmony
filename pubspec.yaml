name: harmony
description: "A private memory journal for two."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.8.0

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.6.1

  # Local database (kept for offline cache during migration)
  hive_flutter: ^1.1.0

  # Firebase
  firebase_core: ^3.13.0
  firebase_auth: ^5.5.2
  cloud_firestore: ^5.6.5
  firebase_storage: ^12.4.4
  firebase_messaging: ^15.2.5

  # Routing
  go_router: ^14.6.3

  # Fonts (loaded via google_fonts at runtime, cached for offline use)
  google_fonts: ^6.2.1

  # Image picking & handling
  image_picker: ^1.1.2
  path_provider: ^2.1.5
  path: ^1.9.0

  # Page flip animation
  page_flip: ^0.2.5+1

  # Network & URL
  http: ^1.2.0
  url_launcher: ^6.3.0

  # Utilities
  uuid: ^4.5.1
  intl: ^0.20.2
  timeago: ^3.7.0

  card_stack_swiper: ^1.1.1
  flutter_svg: ^2.0.17
  cached_network_image: ^3.4.1
  flutter_image_compress: ^2.3.0
  shimmer: ^3.0.0
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.3

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/svg/
    - assets/logo/
    - assets/Young_slim_Mediterranean_female_with_long_wavy_dar_breathing-idle_south-east.gif
    - assets/Young_brunette_male_with_curly_black_hair_short_be_breathing-idle_west.gif
    - assets/Young_slim_Mediterranean_female_with_long_wavy_dar_custom-She throws her arms up in joy _south-east.gif
    - assets/Young_brunette_male_with_curly_black_hair_short_be_custom-He lifts his arms in the air, _south-east.gif

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/logo/app_logo.jpg"
  min_sdk_android: 21
  web:
    generate: false
  windows:
    generate: false
