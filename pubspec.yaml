name: harmony
description: "A private memory journal for two."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.7.2

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Local database
  hive_flutter: ^1.1.0

  # Routing
  go_router: ^14.6.3

  # Fonts (loaded via google_fonts at runtime, cached for offline use)
  google_fonts: ^6.2.1

  # Image picking & handling
  image_picker: ^1.1.2
  path_provider: ^2.1.5
  path: ^1.9.0

  # Swipe cards
  appinio_swiper: ^2.1.1

  # Utilities
  uuid: ^4.5.1
  intl: ^0.20.2
  timeago: ^3.7.0

  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  build_runner: ^2.4.14
  riverpod_generator: ^2.6.1
  hive_generator: ^2.0.1

flutter:
  uses-material-design: true

  assets:
    - assets/images/
