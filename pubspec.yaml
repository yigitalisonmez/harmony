name: harmony
description: "A private memory journal for two."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.8.0

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.6.1

  # Local database
  hive_flutter: ^1.1.0

  # Routing
  go_router: ^14.6.3

  # Fonts (loaded via google_fonts at runtime, cached for offline use)
  google_fonts: ^6.2.1

  # Image picking & handling
  image_picker: ^1.1.2
  path_provider: ^2.1.5
  path: ^1.9.0

  # Page flip animation
  page_flip: ^0.2.5+1

  # Network & URL
  http: ^1.2.0
  url_launcher: ^6.3.0

  # Utilities
  uuid: ^4.5.1
  intl: ^0.20.2
  timeago: ^3.7.0

  card_stack_swiper: ^1.1.1
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
