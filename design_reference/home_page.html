<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Home</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
            href="https://fonts.googleapis.com/css2?family=Figtree:wght@300;400;500;600;700;800;900&display=swap"
            rel="stylesheet"
    />
    <link
            href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@100;200;300;400;500;600;700;800&display=swap"
            rel="stylesheet"
    />
    <link
            href="https://fonts.googleapis.com/css2?family=Jost:wght@100;200;300;400;500;600;700;800;900&display=swap"
            rel="stylesheet"
    />
    <link
            href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700;800;900&display=swap"
            rel="stylesheet"
    />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://code.iconify.design/iconify-icon/3.0.0/iconify-icon.min.js"></script>
    <style type="text/tailwindcss">
        @theme inline {
          --color-background: var(--background);
          --color-foreground: var(--foreground);
          --color-primary: var(--primary);
          --color-primary-foreground: var(--primary-foreground);
          --color-secondary: var(--secondary);
          --color-secondary-foreground: var(--secondary-foreground);
          --color-muted: var(--muted);
          --color-muted-foreground: var(--muted-foreground);
          --color-accent: var(--accent);
          --color-accent-foreground: var(--accent-foreground);
          --color-destructive: var(--destructive);
          --color-card: var(--card);
          --color-card-foreground: var(--card-foreground);
          --color-popover: var(--popover);
          --color-popover-foreground: var(--popover-foreground);
          --color-border: var(--border);
          --color-input: var(--input);
          --color-ring: var(--ring);
          --color-chart-1: var(--chart-1);
          --color-chart-2: var(--chart-2);
          --color-chart-3: var(--chart-3);
          --color-chart-4: var(--chart-4);
          --color-chart-5: var(--chart-5);

          --font-font-sans: var(--font-sans);
          --font-font-heading: var(--font-heading);
          --font-font-serif: var(--font-serif);
          --font-font-mono: var(--font-mono);

          --radius-sm: calc(var(--radius) - 4px);
          --radius-md: calc(var(--radius) - 2px);
          --radius-lg: var(--radius);
          --radius-xl: calc(var(--radius) + 4px);
        }

        :root {
            --background: #000000;
          --foreground: #FFFFFF;
          --primary: #ff7070;
          --primary-foreground: #000000;
          --secondary: #1A1A1A;
          --secondary-foreground: #FFFFFF;
          --muted: #1A1A1A;
          --muted-foreground: #888888;
          --accent: #C1FF00;
          --accent-foreground: #000000;
          --destructive: #FF3B30;
          --card: #121212;
          --card-foreground: #FFFFFF;
          --popover: #121212;
          --popover-foreground: #FFFFFF;
          --border: #1A1A1A;
          --input: #1A1A1A;
          --ring: #C1FF00;
          --chart-1: #C1FF00;
          --chart-2: #FF00FF;
          --chart-3: #FFBF00;
          --chart-4: #ffaa00;
          --chart-5: #00ffff;

          --font-sans: "Figtree";
          --font-heading: "Jost";
          --font-serif: "Playfair Display";
          --font-mono: "JetBrains Mono";

          --radius: 2rem;
        }

        /* Prevent layout shift for icons without explicit dimensions */
        iconify-icon:not([width]):not([height]) {
          display: inline-block;
          width: 1em;
          height: 1em;
        }

        /* Hide scrollbars */
        *,
        *::before,
        *::after {
          scrollbar-width: none;
          -ms-overflow-style: none;
        }
        *::-webkit-scrollbar {
          display: none;
        }
    </style>
</head>
<body>
<main
        class="relative min-h-[100dvh] w-full bg-black flex flex-col items-center justify-start overflow-hidden font-sans pb-32"
>
    <div
            class="w-full p-6 flex items-center justify-between z-30 sticky top-0 bg-black/80 backdrop-blur-sm"
    >
        <div class="flex items-center gap-3">
            <div
                    class="size-9 bg-primary rounded-xl flex items-center justify-center shadow-[0_0_20px_rgba(193,255,0,0.3)]"
            >
                <iconify-icon
                        icon="solar:heart-bold"
                        class="text-black"
                        width="24"
                        height="24"
                ></iconify-icon>
            </div>
            <span class="font-heading text-2xl font-black tracking-tighter text-white lowercase"
            >harmony</span
            >
        </div>
        <button
                class="size-10 rounded-full bg-white/5 flex items-center justify-center border border-white/10 transition-transform active:scale-90"
        >
            <iconify-icon
                    icon="solar:settings-linear"
                    class="text-white/60"
                    width="20"
                    height="20"
            ></iconify-icon>
        </button>
    </div>
    <div class="relative w-[92%] aspect-[3.5/4.5] mt-2 flex items-center justify-center">
        <div
                class="absolute inset-0 bg-white/5 rounded-[3rem] rotate-[-2deg] scale-[0.98] -z-10"
        ></div>
        <div
                class="relative w-full h-full rounded-[3rem] overflow-hidden border border-white/5 shadow-2xl group"
        >
            <img
                    alt="Memory"
                    src="https://ggrhecslgdflloszjkwl.supabase.co/storage/v1/object/public/user-assets/Pxq0GBpLCWA/components/9bq96Cevacp.png-2"
                    class="w-full h-full object-cover transition-transform duration-[4000ms] group-hover:scale-110"
            />
            <div class="absolute top-6 left-6">
                <div
                        class="px-4 py-2 bg-black/60 backdrop-blur-xl rounded-full border border-white/10 flex items-center gap-2"
                >
                    <iconify-icon
                            icon="solar:calendar-bold"
                            class="text-primary"
                            width="16"
                            height="16"
                    ></iconify-icon
                    ><span class="text-[12px] font-black tracking-widest text-white uppercase"
                >Aug 22, 2024</span
                >
                </div>
            </div>
            <div class="absolute bottom-6 left-6">
                <div
                        class="px-4 py-2 bg-black/60 backdrop-blur-xl rounded-full border border-white/10 flex items-center gap-2"
                >
                    <iconify-icon
                            icon="solar:map-point-bold"
                            class="text-primary"
                            width="16"
                            height="16"
                    ></iconify-icon
                    ><span class="text-[12px] font-black tracking-widest text-white uppercase"
                >Berlin</span
                >
                </div>
            </div>
        </div>
    </div>
    <div class="w-full px-8 mt-10 space-y-6">
        <div class="flex items-start gap-4">
            <div class="mt-1.5">
                <div
                        class="size-6 bg-primary rounded-md flex items-center justify-center shadow-[0_0_10px_rgba(193,255,0,0.2)]"
                >
                    <iconify-icon
                            icon="hugeicons:note-01"
                            class="text-black"
                            width="16"
                            height="16"
                    ></iconify-icon>
                </div>
            </div>
            <div class="flex-1">
                <p
                        class="text-[20px] text-white font-serif italic leading-[1.6] tracking-tight opacity-95"
                >
                    "Still buzzing from that night. The lights, the music, everything felt electric. Glad
                    we captured this moment together."
                </p>
            </div>
        </div>
        <div class="flex items-center gap-2 text-white/40">
            <iconify-icon icon="solar:clock-circle-linear" width="16" height="16"></iconify-icon
            ><span class="text-[11px] font-black tracking-[0.2em] uppercase">Added 2 hours ago</span>
        </div>
    </div>
    <div class="fixed bottom-10 left-1/2 -translate-x-1/2 flex items-center gap-14 z-40">
        <button
                class="text-white/20 hover:text-white transition-all active:scale-75"
                aria-label="Dismiss"
        >
            <iconify-icon icon="hugeicons:cancel-01" width="36" height="36"></iconify-icon>
        </button>
        <div class="relative group">
            <div
                    class="absolute inset-0 bg-primary/50 rounded-full blur-[40px] opacity-60 group-hover:opacity-100 transition-opacity"
            ></div>
            <button
                    class="relative bg-primary size-24 rounded-full flex items-center justify-center text-black shadow-[0_0_40px_rgba(193,255,0,0.4)] active:scale-90 transition-transform"
                    aria-label="Like"
            >
                <iconify-icon icon="solar:heart-bold" width="48" height="48"></iconify-icon>
            </button>
        </div>
        <button
                class="text-white/20 hover:text-white transition-all active:scale-75"
                aria-label="Share"
        >
            <iconify-icon icon="hugeicons:share-01" width="36" height="36"></iconify-icon>
        </button>
    </div>
</main>
</body>
</html>
